# Конфигурация для spring + (в перспективе) postgresql

version: '3.9'
services:
  app-ktor:
    image: my-project-app-ktor-jvm:0.0.1
    ports:
      - "8080"
    environment:
      DB_TYPE_PROD: "psql"
      MKPLADS_HOST: "psql"
      MKPLADS_PORT: 5432
      MKPLADS_DB: "project_devs"
      MKPLADS_USER: "postgres"
      MKPLADS_PASS: "project-pass"
    depends_on:
      psql:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]


  psql:
    image: postgres
#    ports:
#      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: "project-pass"
      POSTGRES_USER: "postgres"
      POSTGRES_DB: "project_devs"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5

  liquibase:
    image: "my-project-migration-pg:0.0.1"
    environment:
      LIQUIBASE_URL:
      LIQUIBASE_COMMAND_URL: jdbc:postgresql://psql:5432/project_devs
      LIQUIBASE_COMMAND_USERNAME: postgres
      LIQUIBASE_COMMAND_PASSWORD: "project-pass"
      LIQUIBASE_LIQUIBASE_SCHEMA_NAME: public
    #      tableName: project_devs

    depends_on:
      psql:
        condition: service_healthy

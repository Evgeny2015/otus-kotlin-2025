openapi: 3.0.4
info:
  title: Логирование устройств
  description: Log модели для логирования операций с устройствами
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
paths: {}

components:
  schemas:
    CommonLogModel:
      title: Общая модель лога
      description: Общая модель лога для всех микросервисов системы
      type: object
      properties:
        messageTime:
          type: string
        logId:
          type: string
        source:
          type: string
        ad:
          $ref: '#/components/schemas/DevLogModel'
#        comments:
#          $ref: '#/components/schemas/DevLogModel'
#        files:
#          $ref: '#/components/schemas/DevLogModel'
#        images:
#          $ref: '#/components/schemas/DevLogModel'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorLogModel'

    DevLogModel:
      title: Модель лога для микросервиса Dev
      type: object
      properties:
        requestId:
          type: string
        operation:
          $ref: '#/components/schemas/DevLogOperation'
        requestDev:
          $ref: '#/components/schemas/DevLog'
        requestFilter:
          $ref: '#/components/schemas/DevFilterLog'
        responseDev:
          $ref: '#/components/schemas/DevLog'
        responseDevs:
          type: array
          items:
            $ref: '#/components/schemas/DevLog'

    DevLogOperation:
      type: string
      enum:
        - create
        - read
        - update
        - delete
        - search

    ErrorLogModel:
      title: Модель лога для ошибки
      type: object
      properties:
        message:
          type: string
        field:
          type: string
        code:
          type: string
        level:
          type: string

    DevLog:
      title: Модель лога для устройства
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        deviceType:
          type: string
        roomId:
          type: string
        deviceStatus:
          type: string
        configuration:
          type: string
        model:
          type: string
        ownerId:
          type: string
        visibility:
          type: string
        permissions:
          type: array
          uniqueItems: true
          items:
            type: string

    DevFilterLog:
      title: Модель лога фильтра
      properties:
        searchString:
          type: string
        ownerId:
          type: string
